<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>脳トレ高速アプリ</title>

<style>
html,body{
    margin:0;
    padding:0;
    height:100%;
    font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
    background:linear-gradient(135deg,#4facfe 0%,#00f2fe 100%);
    overflow:hidden;
}

/* 🍪 クッキー */
.cookie{
    position:fixed;
    border-radius:50%;
    pointer-events:none;
    animation:spin linear infinite;
    z-index:0;
}

.cookie::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background-image:
        radial-gradient(#3b2f2f 5px, transparent 6px),
        radial-gradient(#3b2f2f 4px, transparent 5px),
        radial-gradient(#3b2f2f 6px, transparent 7px);
    background-position:10px 15px, 35px 25px, 20px 40px;
    background-repeat:no-repeat;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

/* 🤖 隠れロボ */
.hidden-bot{
    position:fixed;
    width:70px;
    height:70px;
    background:#2da9ff;
    border-radius:50%;
    box-shadow:0 0 20px rgba(0,0,255,0.6);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:32px;
    cursor:pointer;
    z-index:5;
    animation:float 2s infinite ease-in-out;
}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0);}
}

/* アプリUI */
.app{
    position:relative;
    z-index:10;
    background:white;
    width:95%;
    max-width:400px;
    margin:40px auto;
    border-radius:25px;
    padding:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.25);
    text-align:center;
}

#question{font-size:28px;margin:20px 0;}

input{
    font-size:22px;
    padding:8px;
    width:120px;
    text-align:center;
    border-radius:10px;
    border:1px solid #ccc;
}

button{
    margin-top:10px;
    padding:10px 20px;
    font-size:16px;
    border:none;
    border-radius:12px;
    background:#4facfe;
    color:white;
    cursor:pointer;
}

.stats{margin-top:15px;font-size:14px;}
.ranking{margin-top:15px;text-align:left;}
ol{padding-left:20px;}
</style>
</head>
<body>

<div class="app">
    <h1>🧠 脳トレ</h1>
    <div id="question">スタートを押してください</div>
    <input type="number" id="answer" disabled>
    <br>
    <button onclick="startGame()">スタート</button>

    <div class="stats">
        ⏱ <span id="time">30</span>秒  
        ⭐ <span id="score">0</span>点  
        🚀 Lv.<span id="level">1</span>
    </div>

    <div class="ranking">
        <h3>🏆 ランキング TOP5</h3>
        <ol id="rankingList"></ol>
    </div>
</div>

<script>
/* 🍪 クッキー生成 */
function createCookies(){
    const count=Math.floor(Math.random()*11)+5;
    for(let i=0;i<count;i++){
        const cookie=document.createElement("div");
        cookie.className="cookie";

        const size=Math.random()*40+40;
        cookie.style.width=size+"px";
        cookie.style.height=size+"px";
        cookie.style.background="radial-gradient(circle at 30% 30%, #d2691e 60%, #8b4513 100%)";

        cookie.style.left=Math.random()*window.innerWidth+"px";
        cookie.style.top=Math.random()*window.innerHeight+"px";

        cookie.style.animationDuration=(Math.random()*10+10)+"s";

        document.body.appendChild(cookie);
        moveRandom(cookie);
    }
}

function moveRandom(el){
    let x=Math.random()*window.innerWidth;
    let y=Math.random()*window.innerHeight;
    let dx=(Math.random()-0.5)*0.6;
    let dy=(Math.random()-0.5)*0.6;

    function animate(){
        x+=dx; y+=dy;
        if(x<0||x>window.innerWidth) dx*=-1;
        if(y<0||y>window.innerHeight) dy*=-1;
        el.style.left=x+"px";
        el.style.top=y+"px";
        requestAnimationFrame(animate);
    }
    animate();
}
createCookies();

/* 🤖 隠れロボ */
function spawnHiddenBot(){
    const bot=document.createElement("div");
    bot.className="hidden-bot";
    bot.textContent="🤖";

    bot.style.left=Math.random()*(window.innerWidth-80)+"px";
    bot.style.top=Math.random()*(window.innerHeight-80)+"px";

    bot.onclick=function(){
        score+=5;
        updateDisplay();
        bot.remove();
    };

    document.body.appendChild(bot);
    setTimeout(()=>bot.remove(),8000);
}
setInterval(spawnHiddenBot,15000);

/* ===== ゲーム部分 ===== */
let score=0,time=30,level=1,timer,correct;
let audioCtx=null;

function initAudio(){
    if(!audioCtx){
        audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    }
    if(audioCtx.state==="suspended") audioCtx.resume();
}

/* 正解音 ピンポーン♪ */
function playCorrect(){
    initAudio();
    const now=audioCtx.currentTime;
    const osc1=audioCtx.createOscillator();
    const osc2=audioCtx.createOscillator();
    const gain=audioCtx.createGain();

    osc1.type="triangle";
    osc2.type="triangle";
    osc1.frequency.value=1046;
    osc2.frequency.value=1568;

    osc1.connect(gain);
    osc2.connect(gain);
    gain.connect(audioCtx.destination);

    gain.gain.setValueAtTime(0.9,now);
    gain.gain.exponentialRampToValueAtTime(0.001,now+0.6);

    osc1.start(now);
    osc2.start(now);
    osc1.stop(now+0.6);
    osc2.stop(now+0.6);
}

/* 不正解 */
function playWrong(){
    initAudio();
    const now=audioCtx.currentTime;
    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();

    osc.type="sawtooth";
    osc.frequency.setValueAtTime(250,now);
    osc.frequency.exponentialRampToValueAtTime(120,now+0.4);

    gain.gain.setValueAtTime(0.6,now);
    gain.gain.exponentialRampToValueAtTime(0.001,now+0.4);

    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now+0.4);
}

/* 終了音 未来ガジェット風 */
function playEnd(){
    initAudio();
    const now=audioCtx.currentTime;
    const notes=[523,659,784,1046];
    notes.forEach((f,i)=>{
        const osc=audioCtx.createOscillator();
        const gain=audioCtx.createGain();
        osc.type="triangle";
        osc.frequency.value=f;
        gain.gain.setValueAtTime(0.7,now+i*0.15);
        gain.gain.exponentialRampToValueAtTime(0.001,now+i*0.15+0.4);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now+i*0.15);
        osc.stop(now+i*0.15+0.4);
    });
}

function updateDisplay(){
    scoreDisplay.textContent=score;
    levelDisplay.textContent=level;
    timeDisplay.textContent=time;
}

const scoreDisplay=document.getElementById("score");
const levelDisplay=document.getElementById("level");
const timeDisplay=document.getElementById("time");
const question=document.getElementById("question");
const answer=document.getElementById("answer");

function generate(){
    let max=level*10;
    let a=Math.floor(Math.random()*max)+1;
    let b=Math.floor(Math.random()*max)+1;
    if(Math.random()>0.5){
        correct=a+b;
        question.textContent=`${a} + ${b} = ?`;
    }else{
        correct=a-b;
        question.textContent=`${a} - ${b} = ?`;
    }
}

function startGame(){
    initAudio();
    score=0; time=30; level=1;
    updateDisplay();
    answer.disabled=false;
    answer.focus();
    generate();

    clearInterval(timer);
    timer=setInterval(()=>{
        time--;
        updateDisplay();
        if(time<=0){
            clearInterval(timer);
            question.textContent="終了！";
            answer.disabled=true;
            playEnd();
            saveScore(score);
        }
    },1000);
}

answer.addEventListener("keyup",e=>{
    if(e.key==="Enter"){
        if(Number(answer.value)===correct){
            score++;
            if(score%5===0) level++;
            playCorrect();
        }else{
            playWrong();
        }
        answer.value="";
        updateDisplay();
        generate();
    }
});

/* ランキング */
function saveScore(newScore){
    let scores=JSON.parse(localStorage.getItem("scores"))||[];
    scores.push(newScore);
    scores.sort((a,b)=>b-a);
    scores=scores.slice(0,5);
    localStorage.setItem("scores",JSON.stringify(scores));
    displayRanking();
}

function displayRanking(){
    let scores=JSON.parse(localStorage.getItem("scores"))||[];
    let list=document.getElementById("rankingList");
    list.innerHTML="";
    scores.forEach(s=>{
        let li=document.createElement("li");
        li.textContent=s+" 点";
        list.appendChild(li);
    });
}
displayRanking();
</script>

</body>
</html>
