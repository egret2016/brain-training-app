<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>脳トレ高速アプリ</title>

<style>
html,body{
    margin:0;
    padding:0;
    height:100%;
    font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
    background:linear-gradient(135deg,#4facfe 0%,#00f2fe 100%);
    overflow:hidden;
}

/* 赤フラッシュ */
.flash{ animation:flashRed 0.3s; }
@keyframes flashRed{
    0%{background:rgba(255,0,0,0.4);}
    100%{background:transparent;}
}

/* 揺れ */
.shake{ animation:shake 0.3s; }
@keyframes shake{
    0%{transform:translateX(0);}
    25%{transform:translateX(-10px);}
    50%{transform:translateX(10px);}
    75%{transform:translateX(-10px);}
    100%{transform:translateX(0);}
}

/* キラキラ */
.sparkle{
    position:fixed;
    font-size:22px;
    pointer-events:none;
    animation:fly 1s ease-out forwards;
    z-index:20;
}
@keyframes fly{
    0%{opacity:1;transform:translate(0,0) scale(1);}
    100%{opacity:0;transform:translate(var(--x),var(--y)) scale(0.5);}
}

/* クッキー */
.cookie{
    position:fixed;
    border-radius:50%;
    pointer-events:none;
    animation:spin linear infinite;
    z-index:0;
}
.cookie::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background-image:
        radial-gradient(#3b2f2f 5px, transparent 6px),
        radial-gradient(#3b2f2f 4px, transparent 5px),
        radial-gradient(#3b2f2f 6px, transparent 7px);
    background-position:10px 15px, 35px 25px, 20px 40px;
    background-repeat:no-repeat;
}
@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

/* 隠れロボ */
.hidden-bot{
    position:fixed;
    width:70px;
    height:70px;
    background:#2da9ff;
    border-radius:50%;
    box-shadow:0 0 20px rgba(0,0,255,0.6);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:32px;
    cursor:pointer;
    z-index:5;
    animation:float 2s infinite ease-in-out;
}
@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0);}
}

/* UI */
.app{
    position:relative;
    z-index:10;
    background:white;
    width:95%;
    max-width:400px;
    margin:40px auto;
    border-radius:25px;
    padding:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.25);
    text-align:center;
}
#question{font-size:28px;margin:20px 0;}
input{font-size:22px;padding:8px;width:120px;text-align:center;border-radius:10px;border:1px solid #ccc;}
button{margin-top:10px;padding:10px 20px;font-size:16px;border:none;border-radius:12px;background:#4facfe;color:white;cursor:pointer;}
.stats{margin-top:15px;font-size:14px;}
.ranking{margin-top:15px;text-align:left;}
ol{padding-left:20px;}
</style>
</head>
<body>

<div class="app" id="appBox">
<h1>🧠 脳トレ</h1>
<div id="question">スタートを押してください</div>
<input type="number" id="answer" disabled>
<br>
<button onclick="startGame()">スタート</button>
<div class="stats">
⏱ <span id="time">30</span>秒  
⭐ <span id="score">0</span>点  
🚀 Lv.<span id="level">1</span>
</div>
<div class="ranking">
<h3>🏆 ランキング TOP5</h3>
<ol id="rankingList"></ol>
</div>
</div>

<script>
/* ===== クッキー ===== */
function createCookies(){
    const count=Math.floor(Math.random()*11)+5;
    for(let i=0;i<count;i++){
        const c=document.createElement("div");
        c.className="cookie";
        const size=Math.random()*40+40;
        c.style.width=size+"px";
        c.style.height=size+"px";
        c.style.background="radial-gradient(circle at 30% 30%, #d2691e 60%, #8b4513 100%)";
        c.style.left=Math.random()*window.innerWidth+"px";
        c.style.top=Math.random()*window.innerHeight+"px";
        c.style.animationDuration=(Math.random()*10+10)+"s";
        document.body.appendChild(c);
        moveRandom(c);
    }
}
function moveRandom(el){
    let x=Math.random()*window.innerWidth;
    let y=Math.random()*window.innerHeight;
    let dx=(Math.random()-0.5)*0.6;
    let dy=(Math.random()-0.5)*0.6;
    function animate(){
        x+=dx;y+=dy;
        if(x<0||x>window.innerWidth)dx*=-1;
        if(y<0||y>window.innerHeight)dy*=-1;
        el.style.left=x+"px";
        el.style.top=y+"px";
        requestAnimationFrame(animate);
    }
    animate();
}
createCookies();

/* ===== キラキラ ===== */
function sparkleEffect(){
    for(let i=0;i<15;i++){
        const s=document.createElement("div");
        s.className="sparkle";
        s.textContent="✨";
        s.style.left=window.innerWidth/2+"px";
        s.style.top=window.innerHeight/2+"px";
        s.style.setProperty("--x",(Math.random()*400-200)+"px");
        s.style.setProperty("--y",(Math.random()*400-200)+"px");
        document.body.appendChild(s);
        setTimeout(()=>s.remove(),1000);
    }
}

/* ===== 間違い演出 ===== */
function wrongEffect(){
    document.body.classList.add("flash");
    document.getElementById("appBox").classList.add("shake");
    setTimeout(()=>{
        document.body.classList.remove("flash");
        document.getElementById("appBox").classList.remove("shake");
    },300);
}

/* ===== 隠れロボ ===== */
function spawnHiddenBot(){
    const bot=document.createElement("div");
    bot.className="hidden-bot";
    bot.textContent="🤖";
    bot.style.left=Math.random()*(window.innerWidth-80)+"px";
    bot.style.top=Math.random()*(window.innerHeight-80)+"px";
    bot.onclick=function(){
        score+=5;
        updateDisplay();
        bot.remove();
    };
    document.body.appendChild(bot);
    setTimeout(()=>bot.remove(),8000);
}
setInterval(spawnHiddenBot,15000);

/* ===== ゲーム ===== */
let score=0,time=30,level=1,timer,correct;
let audioCtx=null;

function initAudio(){
    if(!audioCtx){
        audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    }
    if(audioCtx.state==="suspended")audioCtx.resume();
}

/* 🎯 クイズ番組風 ピンポン */
function playCorrect(){
    initAudio();
    const now = audioCtx.currentTime;

    // ピン
    const osc1 = audioCtx.createOscillator();
    const gain1 = audioCtx.createGain();
    osc1.type = "triangle";
    osc1.frequency.setValueAtTime(988, now);
    gain1.gain.setValueAtTime(1.0, now);
    gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
    osc1.connect(gain1);
    gain1.connect(audioCtx.destination);
    osc1.start(now);
    osc1.stop(now + 0.18);

    // ポーン（和音）
    const osc2 = audioCtx.createOscillator();
    const osc3 = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();
    osc2.type = "triangle";
    osc3.type = "triangle";
    osc2.frequency.setValueAtTime(1318, now + 0.18);
    osc3.frequency.setValueAtTime(1568, now + 0.18);
    gain2.gain.setValueAtTime(0.9, now + 0.18);
    gain2.gain.exponentialRampToValueAtTime(0.001, now + 1.0);
    osc2.connect(gain2);
    osc3.connect(gain2);
    gain2.connect(audioCtx.destination);
    osc2.start(now + 0.18);
    osc3.start(now + 0.18);
    osc2.stop(now + 1.0);
    osc3.stop(now + 1.0);
}

function playWrong(){
    initAudio();
    const now=audioCtx.currentTime;
    const o=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    o.type="sawtooth";
    o.frequency.setValueAtTime(250,now);
    o.frequency.exponentialRampToValueAtTime(120,now+0.4);
    g.gain.setValueAtTime(0.6,now);
    g.gain.exponentialRampToValueAtTime(0.001,now+0.4);
    o.connect(g);g.connect(audioCtx.destination);
    o.start(now);o.stop(now+0.4);
}

function updateDisplay(){
    scoreDisplay.textContent=score;
    levelDisplay.textContent=level;
    timeDisplay.textContent=time;
}

const scoreDisplay=document.getElementById("score");
const levelDisplay=document.getElementById("level");
const timeDisplay=document.getElementById("time");
const question=document.getElementById("question");
const answer=document.getElementById("answer");

function generate(){
    let max=level*10;
    let a=Math.floor(Math.random()*max)+1;
    let b=Math.floor(Math.random()*max)+1;
    if(Math.random()>0.5){
        correct=a+b;
        question.textContent=`${a} + ${b} = ?`;
    }else{
        correct=a-b;
        question.textContent=`${a} - ${b} = ?`;
    }
}

function startGame(){
    initAudio();
    score=0;time=30;level=1;
    updateDisplay();
    answer.disabled=false;
    answer.focus();
    generate();
    clearInterval(timer);
    timer=setInterval(()=>{
        time--;
        updateDisplay();
        if(time<=0){
            clearInterval(timer);
            question.textContent="終了！";
            answer.disabled=true;
        }
    },1000);
}

answer.addEventListener("keyup",e=>{
    if(e.key==="Enter"){
        if(Number(answer.value)===correct){
            score++;
            if(score%5===0)level++;
            playCorrect();
            sparkleEffect();
        }else{
            playWrong();
            wrongEffect();
        }
        answer.value="";
        updateDisplay();
        generate();
    }
});
</script>

</body>
</html>
