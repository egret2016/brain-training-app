<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>脳トレ高速アプリ</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
    background:linear-gradient(180deg,#4facfe,#00f2fe);
    overflow:hidden;
}

/* 🍪 クッキー背景 */
.cookie{
    position:fixed;
    width:60px;
    height:60px;
    background:radial-gradient(circle at 30% 30%, #d2691e 60%, #8b4513 100%);
    border-radius:50%;
    box-shadow:inset -4px -4px 10px rgba(0,0,0,0.3);
    pointer-events:none;
    animation:spin linear infinite;
}

/* チョコチップ */
.cookie::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background-image:
        radial-gradient(#3b2f2f 6px, transparent 7px),
        radial-gradient(#3b2f2f 5px, transparent 6px),
        radial-gradient(#3b2f2f 4px, transparent 5px);
    background-position:10px 15px, 35px 25px, 20px 40px;
    background-repeat:no-repeat;
}

@keyframes spin{
    from{ transform:rotate(0deg); }
    to{ transform:rotate(360deg); }
}

.app{
    position:relative;
    z-index:10;
    background:white;
    width:95%;
    max-width:400px;
    margin:50px auto;
    border-radius:25px;
    padding:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.25);
    text-align:center;
}

#question{
    font-size:30px;
    margin:20px 0;
}

input{
    font-size:22px;
    padding:8px;
    width:120px;
    text-align:center;
    border-radius:10px;
    border:1px solid #ccc;
}

button{
    margin-top:10px;
    padding:10px 20px;
    font-size:16px;
    border:none;
    border-radius:12px;
    background:#4facfe;
    color:white;
    cursor:pointer;
}

.stats{ margin-top:15px; font-size:14px; }
.ranking{ margin-top:15px; text-align:left; }
ol{ padding-left:20px; }
</style>
</head>
<body>

<div class="app">
    <h1>🧠 脳トレ</h1>
    <div id="question">スタートを押してください</div>
    <input type="number" id="answer" disabled>
    <br>
    <button onclick="startGame()">スタート</button>

    <div class="stats">
        ⏱ <span id="time">30</span>秒  
        ⭐ スコア: <span id="score">0</span>  
        🚀 Lv.<span id="level">1</span>
    </div>

    <div class="ranking">
        <h3>🏆 ランキング TOP5</h3>
        <ol id="rankingList"></ol>
    </div>
</div>

<script>
/* 🍪 クッキー生成 */
function createCookies(){
    const count = Math.floor(Math.random()*11)+5; // 5〜15個
    for(let i=0;i<count;i++){
        const cookie=document.createElement("div");
        cookie.className="cookie";

        const size=Math.random()*40+40;
        cookie.style.width=size+"px";
        cookie.style.height=size+"px";

        cookie.style.left=Math.random()*window.innerWidth+"px";
        cookie.style.top=Math.random()*window.innerHeight+"px";

        const duration=Math.random()*10+10;
        cookie.style.animationDuration=duration+"s";

        document.body.appendChild(cookie);

        moveRandom(cookie);
    }
}

function moveRandom(el){
    let x=Math.random()*window.innerWidth;
    let y=Math.random()*window.innerHeight;
    let dx=(Math.random()-0.5)*0.5;
    let dy=(Math.random()-0.5)*0.5;

    function animate(){
        x+=dx;
        y+=dy;

        if(x<0||x>window.innerWidth) dx*=-1;
        if(y<0||y>window.innerHeight) dy*=-1;

        el.style.left=x+"px";
        el.style.top=y+"px";

        requestAnimationFrame(animate);
    }
    animate();
}

createCookies();

/* ====== ゲーム部分（前回と同じ） ====== */
let score=0,time=30,level=1,timer,correct;
let audioCtx=null;

function initAudio(){
    if(!audioCtx){
        audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    }
    if(audioCtx.state==="suspended"){
        audioCtx.resume();
    }
}

function playCorrect(){
    initAudio();
    const now=audioCtx.currentTime;

    const osc1=audioCtx.createOscillator();
    const osc2=audioCtx.createOscillator();
    const gain=audioCtx.createGain();

    osc1.type="triangle";
    osc2.type="triangle";

    osc1.frequency.setValueAtTime(1046,now);
    osc2.frequency.setValueAtTime(1568,now);

    osc1.connect(gain);
    osc2.connect(gain);
    gain.connect(audioCtx.destination);

    gain.gain.setValueAtTime(0.9,now);
    gain.gain.exponentialRampToValueAtTime(0.001,now+0.6);

    osc1.start(now);
    osc2.start(now);
    osc1.stop(now+0.6);
    osc2.stop(now+0.6);
}

function playWrong(){
    initAudio();
    const now=audioCtx.currentTime;
    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();

    osc.type="sawtooth";
    osc.frequency.setValueAtTime(250,now);
    osc.frequency.exponentialRampToValueAtTime(120,now+0.4);

    gain.gain.setValueAtTime(0.6,now);
    gain.gain.exponentialRampToValueAtTime(0.001,now+0.4);

    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now+0.4);
}

function updateDisplay(){
    scoreDisplay.textContent=score;
    levelDisplay.textContent=level;
    timeDisplay.textContent=time;
}

const scoreDisplay=document.getElementById("score");
const levelDisplay=document.getElementById("level");
const timeDisplay=document.getElementById("time");

function generate(){
    let max=level*10;
    let a=Math.floor(Math.random()*max)+1;
    let b=Math.floor(Math.random()*max)+1;

    if(Math.random()>0.5){
        correct=a+b;
        question.textContent=`${a} + ${b} = ?`;
    }else{
        correct=a-b;
        question.textContent=`${a} - ${b} = ?`;
    }
}

const question=document.getElementById("question");
const answer=document.getElementById("answer");

function startGame(){
    initAudio();
    score=0; time=30; level=1;
    updateDisplay();
    answer.disabled=false;
    answer.focus();
    generate();

    clearInterval(timer);
    timer=setInterval(()=>{
        time--;
        updateDisplay();
        if(time<=0){
            clearInterval(timer);
            question.textContent="終了！";
            answer.disabled=true;
        }
    },1000);
}

answer.addEventListener("keyup",e=>{
    if(e.key==="Enter"){
        if(Number(answer.value)===correct){
            score++;
            if(score%5===0) level++;
            playCorrect();
        }else{
            playWrong();
        }
        answer.value="";
        updateDisplay();
        generate();
    }
});
</script>

</body>
</html>
