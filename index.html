<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#4facfe"/>
<link rel="manifest" href="manifest.json">
<title>脳トレ高速アプリ</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    background: linear-gradient(180deg,#4facfe,#00f2fe);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.app {
    background: white;
    width: 95%;
    max-width: 400px;
    border-radius: 25px;
    padding: 25px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.25);
    text-align: center;
}

h1 {
    margin-top: 0;
}

#question {
    font-size: 32px;
    margin: 25px 0;
}

input {
    font-size: 24px;
    padding: 10px;
    width: 120px;
    border-radius: 10px;
    border: 1px solid #ccc;
    text-align: center;
}

button {
    margin-top: 15px;
    padding: 12px 20px;
    font-size: 18px;
    border: none;
    border-radius: 15px;
    background: #4facfe;
    color: white;
}

.stats {
    margin-top: 20px;
    font-size: 15px;
}
</style>
</head>
<body>

<div class="app">
    <h1>🧠 脳トレ</h1>
    <div id="question">スタートを押してください</div>
    <input type="number" id="answer" disabled>
    <br>
    <button onclick="startGame()">スタート</button>

    <div class="stats">
        ⏱ <span id="time">30</span>秒  
        ⭐ <span id="score">0</span>  
        🚀 Lv.<span id="level">1</span>
    </div>
</div>

<script>
let score=0,time=30,level=1,timer,correct;

function generate(){
    let max=level*10;
    let a=Math.floor(Math.random()*max)+1;
    let b=Math.floor(Math.random()*max)+1;
    correct=Math.random()>0.5?a+b:a-b;
    document.getElementById("question").innerText=
        Math.random()>0.5?`${a} + ${b} = ?`:`${a} - ${b} = ?`;
}

function startGame(){
    score=0;time=30;level=1;
    document.getElementById("answer").disabled=false;
    document.getElementById("answer").focus();
    generate();

    clearInterval(timer);
    timer=setInterval(()=>{
        time--;
        document.getElementById("time").innerText=time;
        if(time<=0){
            clearInterval(timer);
            document.getElementById("question").innerText="終了！";
            document.getElementById("answer").disabled=true;
        }
    },1000);
}

document.getElementById("answer").addEventListener("keyup",e=>{
    if(e.key==="Enter"){
        if(Number(e.target.value)===correct){
            score++;
            if(score%5===0) level++;
            document.getElementById("score").innerText=score;
            document.getElementById("level").innerText=level;
        }
        e.target.value="";
        generate();
    }
});
</script>

</body>
</html>
