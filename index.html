<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>脳トレ高速アプリ</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
    background:linear-gradient(180deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.app{
    background:white;
    width:95%;
    max-width:400px;
    border-radius:25px;
    padding:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.25);
    text-align:center;
}
h1{
    margin-top:0;
}
#question{
    font-size:30px;
    margin:20px 0;
}
input{
    font-size:22px;
    padding:8px;
    width:120px;
    text-align:center;
    border-radius:10px;
    border:1px solid #ccc;
}
button{
    margin-top:10px;
    padding:10px 20px;
    font-size:16px;
    border:none;
    border-radius:12px;
    background:#4facfe;
    color:white;
    cursor:pointer;
}
button:active{
    transform:scale(0.98);
}
.stats{
    margin-top:15px;
    font-size:14px;
}
.ranking{
    margin-top:15px;
    text-align:left;
}
.ranking h3{
    margin-bottom:5px;
}
ol{
    padding-left:20px;
}
</style>
</head>
<body>

<div class="app">
    <h1>🧠 脳トレ</h1>
    <div id="question">スタートを押してください</div>
    <input type="number" id="answer" disabled>
    <br>
    <button onclick="startGame()">スタート</button>

    <div class="stats">
        ⏱ <span id="time">30</span>秒  
        ⭐ スコア: <span id="score">0</span>  
        🚀 Lv.<span id="level">1</span>
    </div>

    <div class="ranking">
        <h3>🏆 ランキング TOP5</h3>
        <ol id="rankingList"></ol>
    </div>
</div>

<script>
let score=0,time=30,level=1,timer,correct;
let audioCtx=null;

// 🎵 効果音生成（iPhone完全対応）
function playSound(type){
    if(!audioCtx){
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();

    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    if(type==="correct"){
        oscillator.frequency.value = 880;
    }else if(type==="wrong"){
        oscillator.frequency.value = 180;
    }else if(type==="end"){
        oscillator.frequency.value = 500;
    }

    oscillator.type = "sine";
    gainNode.gain.value = 0.2;

    oscillator.start();
    oscillator.stop(audioCtx.currentTime + 0.25);
}

function updateDisplay(){
    document.getElementById("score").innerText=score;
    document.getElementById("level").innerText=level;
    document.getElementById("time").innerText=time;
}

function generate(){
    let max=level*10;
    let a=Math.floor(Math.random()*max)+1;
    let b=Math.floor(Math.random()*max)+1;

    if(Math.random()>0.5){
        correct=a+b;
        document.getElementById("question").innerText=`${a} + ${b} = ?`;
    }else{
        correct=a-b;
        document.getElementById("question").innerText=`${a} - ${b} = ?`;
    }
}

function startGame(){
    score=0;
    time=30;
    level=1;
    updateDisplay();

    // iPhone音声ロック解除
    if(!audioCtx){
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    document.getElementById("answer").disabled=false;
    document.getElementById("answer").focus();
    generate();

    clearInterval(timer);
    timer=setInterval(()=>{
        time--;
        updateDisplay();

        if(time<=0){
            clearInterval(timer);
            document.getElementById("question").innerText="終了！";
            document.getElementById("answer").disabled=true;
            playSound("end");
            saveScore(score);
        }
    },1000);
}

document.getElementById("answer").addEventListener("keyup",e=>{
    if(e.key==="Enter"){
        if(Number(e.target.value)===correct){
            score++;
            if(score%5===0) level++;
            playSound("correct");
        }else{
            playSound("wrong");
        }
        e.target.value="";
        updateDisplay();
        generate();
    }
});

function saveScore(newScore){
    let scores=JSON.parse(localStorage.getItem("scores"))||[];
    scores.push(newScore);
    scores.sort((a,b)=>b-a);
    scores=scores.slice(0,5);
    localStorage.setItem("scores",JSON.stringify(scores));
    displayRanking();
}

function displayRanking(){
    let scores=JSON.parse(localStorage.getItem("scores"))||[];
    let list=document.getElementById("rankingList");
    list.innerHTML="";
    scores.forEach(score=>{
        let li=document.createElement("li");
        li.innerText=score+" 点";
        list.appendChild(li);
    });
}

displayRanking();
</script>

</body>
</html>
